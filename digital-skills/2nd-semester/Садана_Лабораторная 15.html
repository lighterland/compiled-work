      height: 100vh;

      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;

    /* Top Navigation bar */
    .top-nav {
      background-color: var(--header-bg);

      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      transition: color 0.2s;

    .back-btn:hover {
      color: var(--text-main);
    }

    .title-area {

    }

    .title-area h1 {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 0.15rem;

      color: #ef4444;
      font-size: 0.75rem;

      font-size: 0.85rem;

      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #0f172a;
      outline: none;

    .sheet-viewport {
      flex: 1;
      overflow: auto;
      background-color: #f1f5f9;
      position: relative;
    }

    /* Protection Watermark Overlay */
    .watermark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10;

    /* Excel Table Style */
    table.excel-table {
      border-collapse: collapse;
      background-color: var(--excel-cell-bg);
      color: var(--excel-cell-text);
      font-size: 0.825rem;
      table-layout: fixed;
    }

    table.excel-table th, table.excel-table td {
      border: 1px solid var(--excel-grid-line);
      padding: 4px 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    table.excel-table th {
      background-color: var(--excel-header-bg);
      color: var(--excel-header-text);
      font-weight: 500;
      text-align: center;
      user-select: none;
      position: sticky;
      z-index: 2;

    table.excel-table th.col-header {
      top: 0;
      height: 24px;
    }

    table.excel-table th.row-header {
      left: 0;
      width: 44px;
      z-index: 3;
    }

    table.excel-table th.corner-header {
      top: 0;
      left: 0;
      z-index: 4;
      width: 44px;
      height: 24px;
    }

    /* Selected cell states */
    table.excel-table td.cell {
      cursor: cell;
      position: relative;
    }

    table.excel-table td.cell.selected {
      outline: 2px solid var(--active-cell-border);
      outline-offset: -2px;
      background-color: #f0f7ff !important;
    }

    table.excel-table th.active-header {
      background-color: var(--active-header-bg) !important;
      color: var(--active-header-text) !important;
      font-weight: 700;
    }

    .tab-bar {

      border-top: 1px solid #cbd5e1;
      padding: 0.35rem 0.75rem 0;
      display: flex;
      gap: 0.25rem;
      flex-shrink: 0;
      overflow-x: auto;

      background-color: #e2e8f0;
      border: 1px solid #cbd5e1;
      border-bottom: none;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;

    let activeSheetName = Object.keys(workbookData)[0];

    const tableEl = document.getElementById('excel-table');
    const tabBarEl = document.getElementById('tab-bar');
    const cellAddressEl = document.getElementById('cell-address');
    const formulaInputEl = document.getElementById('formula-input');

    // Utility: Convert column index to letters (e.g. 0 -> A, 27 -> AB)
    function getColLetter(colIndex) {
      let temp = '';
      let letter = '';
      while (colIndex >= 0) {
        temp = colIndex % 26;
        letter = String.fromCharCode(65 + temp) + letter;
        colIndex = Math.floor(colIndex / 26) - 1;
      }
      return letter;
    }

    // Build the Tab Bar
    function buildTabBar() {
      tabBarEl.innerHTML = '';
      Object.keys(workbookData).forEach(sheetName => {
        const tab = document.createElement('div');
        tab.className = 'sheet-tab' + (sheetName === activeSheetName ? ' active' : '');
        tab.textContent = sheetName;
        tab.addEventListener('click', () => {
          activeSheetName = sheetName;
          buildTabBar();
          renderActiveSheet();
        });
        tabBarEl.appendChild(tab);
      });
    }

    // Render the grid table
    function renderActiveSheet() {
      const sheet = workbookData[activeSheetName];
      const cells = sheet.cells;
      const range = sheet.range;

      const minRow = 0;
      const maxRow = Math.max(15, range.e.r); // Render at least 16 rows
      const minCol = 0;
      const maxCol = Math.max(7, range.e.c); // Render at least 8 columns

      let html = '';

      // Column widths (can adjust dynamically if needed, standard width 110px)
      html += '<colgroup>';
      html += '<col style="width: 44px;">'; // corner header
      for (let c = minCol; c <= maxCol; c++) {
        html += '<col style="width: 120px;">';
      }
      html += '</colgroup>';

      // Table Header: Column letters
      html += '<thead><tr>';
      html += '<th class="corner-header"></th>';
      for (let c = minCol; c <= maxCol; c++) {
        const colLetter = getColLetter(c);
        html += `<th class="col-header" id="col-${colLetter}">${colLetter}</th>`;
      }
      html += '</tr></thead>';

      // Table Body: Rows
      html += '<tbody>';
      for (let r = minRow; r <= maxRow; r++) {
        const rowNumber = r + 1;
        html += '<tr>';
        html += `<th class="row-header" id="row-${rowNumber}">${rowNumber}</th>`;
        
        for (let c = minCol; c <= maxCol; c++) {
          const colLetter = getColLetter(c);
          const cellRef = `${colLetter}${rowNumber}`;
          const cell = cells[cellRef];
          
          let valStr = '';
          let cellClass = 'cell';
          
          if (cell) {
            valStr = cell.w || (cell.v !== null && cell.v !== undefined ? cell.v : '');
            cellClass += cell.f ? ' has-formula' : '';
          }

          html += `<td class="${cellClass}" data-ref="${cellRef}">${escapeHtml(valStr.toString())}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody>';

      tableEl.innerHTML = html;
      selectedCellRef = null;
      updateFormulaBar(null);

      // Add click listeners to cells
      tableEl.querySelectorAll('td.cell').forEach(td => {
        td.addEventListener('mousedown', (e) => {
          selectCell(e.target);
        });
      });
    }

    function selectCell(cellEl) {
      // Remove previous selected class
      tableEl.querySelectorAll('td.cell.selected').forEach(td => td.classList.remove('selected'));
      tableEl.querySelectorAll('th.active-header').forEach(th => th.classList.remove('active-header'));

      cellEl.classList.add('selected');
      selectedCellRef = cellEl.getAttribute('data-ref');

      // Highlight corresponding row and col headers
      const parts = selectedCellRef.match(/^([A-Z]+)([0-9]+)$/);
      if (parts) {
        const colLetter = parts[1];
        const rowNumber = parts[2];
        const colHeader = document.getElementById(`col-${colLetter}`);
        const rowHeader = document.getElementById(`row-${rowNumber}`);
        if (colHeader) colHeader.classList.add('active-header');
        if (rowHeader) rowHeader.classList.add('active-header');
      }

      updateFormulaBar(selectedCellRef);
    }

    function updateFormulaBar(ref) {
      if (!ref) {
        cellAddressEl.textContent = 'A1';
        formulaInputEl.value = '';
        return;
      }

      cellAddressEl.textContent = ref;
      const sheet = workbookData[activeSheetName];
      const cell = sheet.cells[ref];

      if (cell) {
        if (cell.f) {
          formulaInputEl.value = '=' + cell.f;
        } else {
          formulaInputEl.value = cell.v !== null && cell.v !== undefined ? cell.v : '';
        }
      } else {
        formulaInputEl.value = '';
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
